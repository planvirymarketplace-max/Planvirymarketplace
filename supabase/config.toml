# KANOPIE Supabase Configuration
# Project: KANOPIE — Human-Led Algorithm Event Services Marketplace

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.google]
enabled = false

[storage]
file_size_limit = "50MB"

# Storage buckets
[[storage.buckets]]
name = "vendor-photos"
public = true
file_size_limit = "10MB"

[[storage.buckets]]
name = "vendor-videos"
public = true
file_size_limit = "50MB"

[[storage.buckets]]
name = "vendor-logos"
public = true
file_size_limit = "2MB"

[[storage.buckets]]
name = "user-avatars"
public = true
file_size_limit = "2MB"

[[storage.buckets]]
name = "event-uploads"
public = false
file_size_limit = "10MB"
